name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $GITHUB_WORKSPACE/pico-sdk
          echo "PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk" >> $GITHUB_ENV

      - name: Clone MicroPython
        run: |
          git clone --depth 1 https://github.com/micropython/micropython.git $GITHUB_WORKSPACE/micropython
          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip

      - name: Clone DS4 Module
        run: |
          # 下載模組到 micropython 目錄內
          git clone --recursive https://github.com/Akatsuki1910/picow-dualshock4.git $GITHUB_WORKSPACE/micropython/ds4_mod

      - name: Build MicroPython Cross-Compiler
        run: |
          make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2
          
          # 【修正關鍵】確認檔案位置並執行
          # 根據原專案結構，micropython.cmake 位於根目錄
          if [ -f "../../ds4_mod/micropython.cmake" ]; then
            echo "Found cmake file in root."
            TARGET_PATH="../../ds4_mod/micropython.cmake"
          else
            echo "Searching for micropython.cmake..."
            TARGET_PATH=$(find ../../ds4_mod -name "micropython.cmake")
          fi
          
          echo "Final path: $TARGET_PATH"
          make BOARD=RPI_PICO_W USER_C_MODULES=$TARGET_PATH
          
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
