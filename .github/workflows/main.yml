name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DS4 Module Source
        uses: actions/checkout@v4
        with:
          repository: Akatsuki1910/picow-dualshock4
          path: ds4_source

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Clone MicroPython
        run: |
          git clone --depth 1 https://github.com/micropython/micropython.git $HOME/micropython
          cd $HOME/micropython
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip lib/micropython-lib

      - name: Merge DS4 Source into MicroPython
        run: |
          # 建立一個完全內部的目錄
          mkdir -p $HOME/micropython/ports/rp2/ds4_ext
          # 將所有原始碼強制複製進去
          cp -r $GITHUB_WORKSPACE/ds4_source/src/* $HOME/micropython/ports/rp2/ds4_ext/
          # 檢查檔案是否真的在裡面
          ls -l $HOME/micropython/ports/rp2/ds4_ext/micropython.cmake

      - name: Build mpy-cross
        run: |
          make -C $HOME/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $HOME/micropython/ports/rp2
          
          # 1. 初始化子模組
          make BOARD=RPI_PICO_W submodules
          
          # 2. 正式編譯
          # 重點：現在使用絕對路徑指向「已經搬進家門」的檔案
          make -j$(nproc) BOARD=RPI_PICO_W USER_C_MODULES=$HOME/micropython/ports/rp2/ds4_ext/micropython.cmake
          
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
