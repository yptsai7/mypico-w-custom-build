name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          path: my_project

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            cmake \
            python3 \
            g++ \
            libstdc++-arm-none-eabi-newlib

      - name: Setup MicroPython
        run: |
          git clone --depth 1 --branch v1.24.1 \
            https://github.com/micropython/micropython.git \
            $GITHUB_WORKSPACE/micropython

          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init \
            lib/pico-sdk \
            lib/tinyusb \
            lib/btstack \
            lib/cyw43-driver \
            lib/lwip \
            lib/micropython-lib

          cd $GITHUB_WORKSPACE/micropython/lib/pico-sdk
          git submodule update --init --recursive

      - name: Patch btstack_config.h
        run: |
          BTSTACK_INC=$GITHUB_WORKSPACE/micropython/ports/rp2/btstack_inc
          BTSTACK_COMMON=$GITHUB_WORKSPACE/micropython/extmod/btstack/btstack_config_common.h

          python3 -c "f=open('$BTSTACK_COMMON','r');c=f.read();f.close();c=c.replace('#define ENABLE_BLE','#ifndef ENABLE_BLE\n#define ENABLE_BLE\n#endif');f=open('$BTSTACK_COMMON','w');f.write(c);f.close();print(c)"

          printf '\n#ifndef ENABLE_CLASSIC\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define ENABLE_CLASSIC 1\n' >> $BTSTACK_INC/btstack_config.h
          printf '#endif\n' >> $BTSTACK_INC/btstack_config.h
          printf '#ifndef ENABLE_HID_HOST\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define ENABLE_HID_HOST 1\n' >> $BTSTACK_INC/btstack_config.h
          printf '#endif\n' >> $BTSTACK_INC/btstack_config.h
          printf '#ifndef NVM_NUM_LINK_KEYS\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define NVM_NUM_LINK_KEYS 16\n' >> $BTSTACK_INC/btstack_config.h
          printf '#endif\n' >> $BTSTACK_INC/btstack_config.h
          printf '#ifndef NVM_NUM_DEVICE_DB_ENTRIES\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define NVM_NUM_DEVICE_DB_ENTRIES 16\n' >> $BTSTACK_INC/btstack_config.h
          printf '#endif\n' >> $BTSTACK_INC/btstack_config.h
          printf '#ifndef MAX_NR_HID_HOST_CONNECTIONS\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define MAX_NR_HID_HOST_CONNECTIONS 2\n' >> $BTSTACK_INC/btstack_config.h
          printf '#endif\n' >> $BTSTACK_INC/btstack_config.h

          echo "=== 修改後 btstack_config.h ==="
          cat $BTSTACK_INC/btstack_config.h

      - name: Patch mpbtstackport.c for Classic BT HID
        run: |
          BTSTACKPORT=$GITHUB_WORKSPACE/micropython/ports/rp2/mpbtstackport.c

          python3 -c "f=open('$BTSTACKPORT','r');c=f.read();f.close();old='void mp_bluetooth_btstack_port_start(void) {\n    hci_power_control(HCI_POWER_ON);\n}';new='void mp_bluetooth_btstack_port_start(void) {\n    static int ds4_init_done = 0;\n    if (!ds4_init_done) {\n        extern void ds4_btstack_init(void);\n        ds4_btstack_init();\n        ds4_init_done = 1;\n    }\n    hci_power_control(HCI_POWER_ON);\n}';c=c.replace(old,new);f=open('$BTSTACKPORT','w');f.write(c);f.close();print('Patched OK')"

          echo "=== 確認 patch ==="
          grep -A10 "mp_bluetooth_btstack_port_start" $BTSTACKPORT

      - name: Debug CYW43 BTstack Transport
        run: |
          echo "=== btstack_hci_transport_cyw43 files ==="
          find $GITHUB_WORKSPACE/micropython/lib/pico-sdk -name "*cyw43*btstack*" -o -name "*btstack*cyw43*" 2>/dev/null

          echo "=== files containing hci_transport_cyw43 ==="
          find $GITHUB_WORKSPACE/micropython/lib/pico-sdk -name "*.c" | xargs grep -l "hci_transport_cyw43" 2>/dev/null

          echo "=== btstack_hci_transport_cyw43.c head ==="
          find $GITHUB_WORKSPACE/micropython/lib/pico-sdk -name "btstack_hci_transport_cyw43.c" -exec head -80 {} \;

      - name: Inject DS4 Module from Local
        run: |
          mkdir -p $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext
          cp -r $GITHUB_WORKSPACE/my_project/external_modules/ds4/* \
            $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/
          echo "=== ds4_ext 目錄內容 ==="
          ls -l $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/

      - name: Build mpy-cross
        run: |
          make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2

          make BOARD=RPI_PICO_W submodules

          make -j$(nproc) BOARD=RPI_PICO_W \
            USER_C_MODULES=$GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/micropython.cmake \
            CFLAGS_EXTRA="-Wno-error -DMICROPY_PY_BLUETOOTH_ENABLE_L2CAP_CHANNELS=1"

          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
