name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          path: my_project

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3 g++ libstdc++-arm-none-eabi-newlib

      - name: Setup MicroPython
        run: |
          git clone --depth 1 --branch v1.24.1 https://github.com/micropython/micropython.git $GITHUB_WORKSPACE/micropython
          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip lib/micropython-lib
          cd lib/pico-sdk
          git submodule update --init --recursive

      - name: Patch btstack_config.h
        run: |
          BTSTACK_INC=$GITHUB_WORKSPACE/micropython/ports/rp2/btstack_inc
          # 移除衝突定義並注入 DS4 專用配置
          sed -i '/#define ENABLE_BLE/d' $BTSTACK_INC/btstack_config.h
          sed -i '/#define ENABLE_CLASSIC/d' $BTSTACK_INC/btstack_config.h
          {
            echo "#define ENABLE_CLASSIC"
            echo "#define ENABLE_BTSTACK_CLASSIC_SUPPORT"
            echo "#define ENABLE_HID_HOST"
            echo "#define MAX_NR_HCI_CONNECTIONS 2"
            echo "#define MAX_NR_HID_HOST_CONNECTIONS 2"
          } > temp_config
          cat $BTSTACK_INC/btstack_config.h >> temp_config
          mv temp_config $BTSTACK_INC/btstack_config.h

      - name: Inject DS4 Module
        run: |
          # 建立母目錄結構
          mkdir -p $GITHUB_WORKSPACE/external/ds4
          # 自動搜尋並複製檔案，解決路徑找不到的問題
          find $GITHUB_WORKSPACE/my_project -name "ds4.c" -exec cp {} $GITHUB_WORKSPACE/external/ds4/ \;
          find $GITHUB_WORKSPACE/my_project -name "micropython.cmake" -exec cp {} $GITHUB_WORKSPACE/external/ds4/ \;
          echo "=== 檢查目錄結構 ==="
          ls -R $GITHUB_WORKSPACE/external

      - name: Build mpy-cross
        run: make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2
          make BOARD=RPI_PICO_W submodules
          # USER_C_MODULES 指向母目錄 external
          make -j$(nproc) BOARD=RPI_PICO_W USER_C_MODULES=$GITHUB_WORKSPACE/external

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: $GITHUB_WORKSPACE/micropython/ports/rp2/build-RPI_PICO_W/firmware.uf2
