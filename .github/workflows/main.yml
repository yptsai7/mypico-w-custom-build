name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Clone MicroPython
        run: |
          git clone --depth 1 https://github.com/micropython/micropython.git $GITHUB_WORKSPACE/micropython
          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip lib/micropython-lib

      - name: Inject DS4 Module
        run: |
          # 1. 下載模組到臨時目錄
          git clone --recursive https://github.com/Akatsuki1910/picow-dualshock4.git $HOME/temp_ds4
          
          # 2. 強行將 src 內容複製到 MicroPython 的用戶模組預設路徑下
          mkdir -p $GITHUB_WORKSPACE/micropython/examples/usercmodule/ds4
          cp -r $HOME/temp_ds4/src/* $GITHUB_WORKSPACE/micropython/examples/usercmodule/ds4/

      - name: Build mpy-cross
        run: |
          make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2
          
          # 先初始化子模組 (這步會跑比較久，請耐心等候)
          make BOARD=RPI_PICO_W submodules
          
          # 使用「相對路徑」指向剛剛注入的目錄，這對 CMake 來說是最穩定的路徑
          # 因為我們在 ports/rp2，所以 ../../examples/usercmodule/ds4/micropython.cmake 一定存在
          make -j$(nproc) BOARD=RPI_PICO_W USER_C_MODULES=../../examples/usercmodule/ds4/micropython.cmake
          
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
