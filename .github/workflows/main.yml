name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DS4 Source
        uses: actions/checkout@v4
        with:
          repository: Akatsuki1910/picow-dualshock4
          path: ds4_source

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Environment and Build
        run: |
          # 1. 在 WORKSPACE 內設定目錄
          export MP_DIR=$GITHUB_WORKSPACE/micropython
          export SDK_DIR=$GITHUB_WORKSPACE/pico-sdk
          
          # 2. 下載 SDK 與 MicroPython
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $SDK_DIR
          git clone --depth 1 https://github.com/micropython/micropython.git $MP_DIR
          
          # 3. 初始化子模組
          cd $MP_DIR
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip lib/micropython-lib
          
          # 4. 建立內部模組目錄並複製 (同一區塊執行確保路徑一致)
          mkdir -p $MP_DIR/ports/rp2/ds4_ext
          cp -r $GITHUB_WORKSPACE/ds4_source/src/* $MP_DIR/ports/rp2/ds4_ext/
          
          # 驗證搬移 (如果這步失敗會立刻中斷)
          test -f $MP_DIR/ports/rp2/ds4_ext/micropython.cmake && echo "File exists!" || exit 1
          
          # 5. 編譯 mpy-cross
          make -C $MP_DIR/mpy-cross
          
          # 6. 編譯 Firmware
          cd $MP_DIR/ports/rp2
          export PICO_SDK_PATH=$SDK_DIR
          
          make BOARD=RPI_PICO_W submodules
          make -j$(nproc) BOARD=RPI_PICO_W USER_C_MODULES=$MP_DIR/ports/rp2/ds4_ext/micropython.cmake
          
          # 7. 搬回產出物
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
