name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          path: my_project

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup MicroPython
        run: |
          # 下載 MicroPython 與 Pico SDK
          git clone --depth 1 https://github.com/micropython/micropython.git $GITHUB_WORKSPACE/micropython
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $GITHUB_WORKSPACE/pico-sdk
          
          # 初始化子模組 (包含 BTstack 與 Wi-Fi 驅動)
          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip lib/micropython-lib

      - name: Inject DS4 Module from Local
        run: |
          # 建立模組目錄並複製檔案
          mkdir -p $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext
          cp -r $GITHUB_WORKSPACE/my_project/external_modules/ds4/* $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/
          
          # 檢查檔案
          ls -l $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/

      - name: Build mpy-cross
        run: |
          make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          export PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk
          cd $GITHUB_WORKSPACE/micropython/ports/rp2
          
          # 準備子模組
          make BOARD=RPI_PICO_W submodules
          
          # 正式編譯
          # 加入 CFLAGS_EXTRA="-Wno-error" 確保不會因為 Warning 而編譯失敗
          make -j$(nproc) BOARD=RPI_PICO_W \
            USER_C_MODULES=$GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext \
            CFLAGS_EXTRA="-Wno-error"
          
          # 複製產出的韌體
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
