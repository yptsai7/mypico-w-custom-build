name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          path: my_project

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            cmake \
            python3 \
            g++ \
            libstdc++-arm-none-eabi-newlib

      - name: Setup MicroPython
        run: |
          git clone --depth 1 --branch v1.24.1 \
            https://github.com/micropython/micropython.git \
            $GITHUB_WORKSPACE/micropython

          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init \
            lib/pico-sdk \
            lib/tinyusb \
            lib/btstack \
            lib/cyw43-driver \
            lib/lwip \
            lib/micropython-lib

          # 完整初始化 pico-sdk 所有子模組（修復 boot/picobin.h 找不到）
          cd $GITHUB_WORKSPACE/micropython/lib/pico-sdk
          git submodule update --init --recursive

      - name: Patch btstack_config.h
        run: |
          BTSTACK_INC=$GITHUB_WORKSPACE/micropython/ports/rp2/btstack_inc
          echo "=== 原始 btstack_config.h ==="
          cat $BTSTACK_INC/btstack_config.h

          printf '\n#define ENABLE_CLASSIC 1\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define ENABLE_HID_HOST 1\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define NVM_NUM_LINK_KEYS 16\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define NVM_NUM_DEVICE_DB_ENTRIES 16\n' >> $BTSTACK_INC/btstack_config.h
          printf '#define MAX_NR_HID_HOST_CONNECTIONS 2\n' >> $BTSTACK_INC/btstack_config.h

          echo "=== 修改後 btstack_config.h ==="
          cat $BTSTACK_INC/btstack_config.h

      - name: Inject DS4 Module from Local
        run: |
          mkdir -p $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext
          cp -r $GITHUB_WORKSPACE/my_project/external_modules/ds4/* \
            $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/
          echo "=== ds4_ext 目錄內容 ==="
          ls -l $GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/

      - name: Build mpy-cross
        run: |
          make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2

          make BOARD=RPI_PICO_W submodules

          make -j$(nproc) BOARD=RPI_PICO_W \
            USER_C_MODULES=$GITHUB_WORKSPACE/micropython/ports/rp2/ds4_ext/micropython.cmake \
            CFLAGS_EXTRA="-Wno-error -DMICROPY_PY_BLUETOOTH_ENABLE_L2CAP_CHANNELS=1"

          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
