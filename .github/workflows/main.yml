name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          path: my_project

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            cmake \
            python3 \
            g++ \
            libstdc++-arm-none-eabi-newlib

      - name: Setup MicroPython
        run: |
          git clone --depth 1 --branch v1.24.1 \
            https://github.com/micropython/micropython.git \
            $GITHUB_WORKSPACE/micropython

          cd $GITHUB_WORKSPACE/micropython
          git submodule update --init \
            lib/pico-sdk \
            lib/tinyusb \
            lib/btstack \
            lib/cyw43-driver \
            lib/lwip \
            lib/micropython-lib

          cd $GITHUB_WORKSPACE/micropython/lib/pico-sdk
          git submodule update --init --recursive

      - name: Patch btstack_config.h
        run: |
          BTSTACK_INC=$GITHUB_WORKSPACE/micropython/ports/rp2/btstack_inc
          # 關鍵修正：先移除可能導致重複定義的 ENABLE_BLE
          sed -i '/#define ENABLE_BLE/d' $BTSTACK_INC/btstack_config.h
          
          # 插入必要的經典藍牙與 HID 支援
          {
            echo "#define ENABLE_CLASSIC"
            echo "#define ENABLE_BTSTACK_CLASSIC_SUPPORT"
            echo "#define ENABLE_HID_HOST"
            echo "#define MAX_NR_HCI_CONNECTIONS 2"
            echo "#define MAX_NR_HID_HOST_CONNECTIONS 2"
          } > temp_config
          cat $BTSTACK_INC/btstack_config.h >> temp_config
          mv temp_config $BTSTACK_INC/btstack_config.h

      - name: Inject DS4 Module
        run: |
          mkdir -p $GITHUB_WORKSPACE/custom_mod
          cp $GITHUB_WORKSPACE/my_project/ds4.c $GITHUB_WORKSPACE/custom_mod/
          cp $GITHUB_WORKSPACE/my_project/micropython.cmake $GITHUB_WORKSPACE/custom_mod/

      - name: Build mpy-cross
        run: make -C $GITHUB_WORKSPACE/micropython/mpy-cross

      - name: Build Firmware
        run: |
          cd $GITHUB_WORKSPACE/micropython/ports/rp2
          make BOARD=RPI_PICO_W submodules
          # 執行編譯，指定用戶模組路徑
          make -j$(nproc) BOARD=RPI_PICO_W \
            USER_C_MODULES=$GITHUB_WORKSPACE/custom_mod

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: $GITHUB_WORKSPACE/micropython/ports/rp2/build-RPI_PICO_W/firmware.uf2
