name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DS4 Module
        uses: actions/checkout@v4
        with:
          # 將目前的專案 code 放在 picow-dualshock4 資料夾內
          path: picow-dualshock4
          submodules: recursive

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Clone MicroPython
        run: |
          # 下載 MicroPython 主程式碼
          git clone --depth 1 https://github.com/micropython/micropython.git $HOME/micropython
          cd $HOME/micropython
          # 初始化必要的子模組
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack

      - name: Build MicroPython Cross-Compiler (mpy-cross)
        run: |
          make -C $HOME/micropython/mpy-cross

      - name: Build Firmware with DS4 Module
        run: |
          # 進入樹莓派 RP2 平台的編譯目錄
          cd $HOME/micropython/ports/rp2
          
          # 修正 BOARD 名稱為 RPI_PICO_W
          # 使用 USER_C_MODULES 參數指向 DS4 模組的配置檔
          make BOARD=RPI_PICO_W USER_C_MODULES=$GITHUB_WORKSPACE/picow-dualshock4/src/micropython.cmake
          
          # 將產出的 .uf2 複製到根目錄以便後續上傳
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
