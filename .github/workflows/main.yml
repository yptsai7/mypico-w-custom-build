name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必須包含 lib/btstack 等子模組

      - name: Install ARM GCC & Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          mkdir build
          cd build
          # 初始化 CMake 並指定 Pico 平台為 pico_w
          cmake -DPICO_BOARD=pico_w ..
          # 開始編譯
          make -j$(nproc)
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Check and Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-uf2
          # 根據專案結構，產出的檔案通常在 build/src/ 或 build/ 目錄下
          path: build/src/*.uf2
