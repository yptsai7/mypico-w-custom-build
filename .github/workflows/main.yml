name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DS4 Module
        uses: actions/checkout@v4
        with:
          # 直接放在根目錄，簡化路徑處理
          submodules: recursive

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Clone MicroPython & Setup Submodules
        run: |
          git clone --depth 1 https://github.com/micropython/micropython.git $HOME/micropython
          cd $HOME/micropython
          # 補全 Pico W 編譯必須的子模組
          git submodule update --init lib/pico-sdk lib/tinyusb lib/btstack lib/cyw43-driver lib/lwip

      - name: Build MicroPython Cross-Compiler
        run: |
          make -C $HOME/micropython/mpy-cross

      - name: Build Firmware with DS4 Module
        run: |
          cd $HOME/micropython/ports/rp2
          
          # 使用相對路徑來避免 $GITHUB_WORKSPACE 的路徑陷阱
          # 指向你 repo 裡的 src/micropython.cmake
          make BOARD=RPI_PICO_W USER_C_MODULES=$GITHUB_WORKSPACE/src/micropython.cmake
          
          cp build-RPI_PICO_W/firmware.uf2 $GITHUB_WORKSPACE/picow_ds4.uf2
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-firmware
          path: picow_ds4.uf2
