name: Build PicoW DS4 Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 關鍵：確保抓到專案內的 lib/btstack 等子模組

      - name: Install ARM GCC & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake python3

      - name: Setup Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          # 賦予 build.sh 執行權限並執行
          chmod +x build.sh
          ./build.sh
        env:
          PICO_SDK_PATH: ${{ env.PICO_SDK_PATH }}

      - name: Check Build Output
        run: |
          if [ -f build/src/picow_ds4.uf2 ]; then
            echo "Build successful!"
          else
            echo "Build failed: uf2 file not found."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picow-ds4-uf2
          path: build/src/picow_ds4.uf2
